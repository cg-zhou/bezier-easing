name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        run: moon update
      - name: Moon check
        run: moon check --deny-warn
      - name: Moon info check
        run: |
          moon info
          git --no-pager diff --no-ext-diff --exit-code
      - name: Moon format
        run: moon fmt
      - name: Moon test
        run: moon test
      - name: Moon bench check
        run: moon bench --build-only
      - name: JS Compatibility check
        run: |
          cd scripts
          npm install
          npm test
